<!DOCTYPE html>
<html>
<head>
    <title>Practical No-3: CSS Demonstration</title>

    <style>
        /* ========== 1. Background Properties ========== */
        body {
            background-color: #e3f2fd;        /* Light blue background */
            background-image: url('https://via.placeholder.com/300');
            background-repeat: no-repeat;
            background-position: right top;
            background-size: 150px;
            padding: 20px;
        }

        /* ========== 2. Font & Text Styling ========== */
        h1 {
            font-family: Arial, sans-serif;
            color: #0d47a1;
            text-align: center;
            text-transform: uppercase;
            text-shadow: 2px 2px 5px #90caf9;
        }

        p {
            font-size: 18px;
            font-family: Georgia, serif;
            line-height: 1.6;
            color: #1a237e;
        }

        /* ========== 3. Positioning ========== */
        .box {
            width: 200px;
            height: 120px;
            background-color: #bbdefb;
            border: 2px solid #0d47a1;
            padding: 10px;
            position: relative;
            left: 50px;        /* Moves box 50px right */
            top: 20px;         /* Moves box 20px down */
        }

        .absolute-box {
            width: 180px;
            height: 100px;
            background-color: #c8e6c9;
            position: absolute;
            right: 20px;
            bottom: 20px;
            padding: 10px;
            border: 2px solid green;
        }
    </style>
</head>

<body>

    <h1>CSS Practical Demonstration</h1>

    <p>
        This web page demonstrates the use of CSS background properties, 
        various text styles, and the positioning of elements using relative 
        and absolute positioning.
    </p>

    <div class="box">
        This is a Relative Positioned Box.
    </div>

    <div class="absolute-box">
        Absolute Positioned Box.
    </div>

</body>
</html>
