<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Operations and Form Validation</title>
    <script>
        // Factorial function
        function factorial(n) {
            let fact = 1;
            for (let i = 1; i <= n; i++) {
                fact *= i;
            }
            return fact;
        }

        // Fibonacci series function
        function fibonacciSeries(n) {
            let fib = [0, 1];
            for (let i = 2; i < n; i++) {
                fib[i] = fib[i - 1] + fib[i - 2];
            }
            return fib.slice(0, n);
        }

        // Prime numbers in a range
        function primeNumbers(start, end) {
            let primes = [];
            for (let num = start; num <= end; num++) {
                if (num > 1) {
                    let isPrime = true;
                    for (let i = 2; i <= Math.sqrt(num); i++) {
                        if (num % i === 0) {
                            isPrime = false;
                            break;
                        }
                    }
                    if (isPrime) primes.push(num);
                }
            }
            return primes;
        }

        // Reverse a number
        function reverseNumber(num) {
            return parseInt(num.toString().split('').reverse().join(''));
        }

        // Form validation
        function validateForm() {
            let name = document.forms["myForm"]["username"].value;
            let age = document.forms["myForm"]["age"].value;
            
            if (name === "") {
                alert("Name must be filled out");
                return false;
            }
            
            if (age === "" || isNaN(age) || age <= 0) {
                alert("Enter a valid age");
                return false;
            }
            
            alert("Form submitted successfully!");
            return true;
        }

        // Example usage
        function showResults() {
            document.getElementById("factorialResult").innerText = "Factorial of 5: " + factorial(5);
            document.getElementById("fibonacciResult").innerText = "Fibonacci Series (5 terms): " + fibonacciSeries(5).join(", ");
            document.getElementById("primeResult").innerText = "Prime numbers between 1 and 20: " + primeNumbers(1, 20).join(", ");
            document.getElementById("reverseResult").innerText = "Reverse of 12345: " + reverseNumber(12345);
        }
    </script>
</head>

<body onload="showResults()">

    <h1>JavaScript Operations Example</h1>

    <p id="factorialResult"></p>
    <p id="fibonacciResult"></p>
    <p id="primeResult"></p>
    <p id="reverseResult"></p>

    <h2>Form Validation Example</h2>
    <form name="myForm" onsubmit="return validateForm()">
        Name: <input type="text" name="username"><br><br>
        Age: <input type="text" name="age"><br><br>
        <input type="submit" value="Submit">
    </form>

</body>
</html>
