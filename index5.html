<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Objects and Cookies Demo</title>
</head>
<body>

    <h1>JavaScript Objects and Cookies Demo</h1>

    <p id="stringDemo"></p>

    <p id="mathDemo"></p>

    <p id="dateDemo"></p>

    <p id="regexpDemo"></p>

    <p id="browserDemo"></p>

    <button onclick="setCookie('username', 'Alex', 7)">Set Cookie</button>
    <button onclick="alert(getCookie('username'))">Get Cookie</button>

    <script>
        // String Object
        let str = new String("Hello, JavaScript!");
        document.getElementById("stringDemo").innerText = "String Length: " + str.length;

        // Math Object
        document.getElementById("mathDemo").innerText = "Random Number (0-100): " + Math.floor(Math.random() * 101);

        // Date Object
        let today = new Date();
        document.getElementById("dateDemo").innerText = "Today's Date: " + today.toDateString();

        // RegExp Object
        let pattern = /JavaScript/i;
        let testStr = "Learning JavaScript is fun!";
        document.getElementById("regexpDemo").innerText = "Pattern test: " + pattern.test(testStr);

        // Browser Objects
        let browserInfo = "Browser: " + navigator.appName + ", Platform: " + navigator.platform;
        browserInfo += ", URL: " + document.URL;
        document.getElementById("browserDemo").innerText = browserInfo;

        // Cookie Functions
        function setCookie(cname, cvalue, exdays) {
            let d = new Date();
            d.setTime(d.getTime() + (exdays * 24 * 60 * 60 * 1000));
            let expires = "expires=" + d.toUTCString();
            document.cookie = cname + "=" + cvalue + ";" + expires + ";path=/";
            alert("Cookie Set: " + cname + "=" + cvalue);
        }

        function getCookie(cname) {
            let name = cname + "=";
            let decodedCookie = decodeURIComponent(document.cookie);
            let ca = decodedCookie.split(';');
            for (let i = 0; i < ca.length; i++) {
                let c = ca[i].trim();
                if (c.indexOf(name) == 0) {
                    return c.substring(name.length, c.length);
                }
            }
            return "Cookie not found";
        }
    </script>
</body>
</html>
